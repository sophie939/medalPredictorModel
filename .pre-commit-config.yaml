# Runs automatically before each `git commit`. Install once with: pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=10000"] # allow the ~7MB raw SQLite DB

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff # lint
        args: ["--fix"]
      - id: ruff-format # format

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout # strip bulky notebook output before committing
        exclude: ^notebook_3_results\.ipynb$ # keep results figures/output visible on GitHub
